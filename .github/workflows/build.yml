name: Build APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3-pip build-essential git \
            libssl-dev zlib1g-dev libbz2-dev \
            libffi-dev liblzma-dev xz-utils \
            openjdk-17-jdk unzip zip autoconf \
            libtool pkg-config cmake
          pip install buildozer cython==0.29.33
          pip install kivy opencv-python pillow imagehash numpy

      - name: Build APK
        run: |
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: GalleryCleaner-APK
          path: bin/*.apk
